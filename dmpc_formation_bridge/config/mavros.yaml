# MAVROS configuration for formation control
# This is loaded for each MAVROS instance (uav1, uav2, etc.)

fcu_url: 'udp://:14540@'  # Default, overridden per-instance
flight_stack: PX4
plugin_allow_list:
  - 'mavros'
  - 'local_position'
  - 'setpoint_velocity'
  - 'command'

local_position:
  frame_id: 'map'
  tf:
    send: false

plugin: 'local_position'

setpoint_velocity:
  mav_frame: 'BODY_NED'
  ignore_manual_speed: true

command:
  use_comp_id_system_control: false

pub:
  local_position/odom: { topic: /uav1/mavros/local_position/odom, hz: 100 }
  state: { topic: /uav1/mavros/state, hz: 10 }
